# Production deployment with Caddy (auto HTTPS).
# Use `./scripts/deploy.sh` on the server for the normal deploy flow:
# build image -> run migrations -> restart services.
#
# Prerequisites:
#   1. DNS A/AAAA record pointing your domain to this server.
#   2. Ports 80 and 443 open in firewall.
#   3. .env configured with APP_ORIGIN=https://xn--rhqt4frvcyuma120e2nl3sb0w5cc9gfrdh28idgq.somnus.top

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: caloriemaster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caloriemaster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caloriemaster}
      POSTGRES_DB: ${POSTGRES_DB:-caloriemaster}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caloriemaster} -d ${POSTGRES_DB:-caloriemaster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: caloriemaster-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-caloriemaster}:${POSTGRES_PASSWORD:-caloriemaster}@postgres:5432/${POSTGRES_DB:-caloriemaster}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      SESSION_COOKIE_NAME: caloriemaster_session
      SESSION_TTL_DAYS: 30
      QWEN_API_KEY: ${QWEN_API_KEY}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3-vl-flash}
      QWEN_API_URL: ${QWEN_API_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      BOOHEE_API_KEY: ${BOOHEE_API_KEY}
      BOOHEE_API_URL: ${BOOHEE_API_URL:-https://api.boohee.com}
      OSS_REGION: ${OSS_REGION:-oss-cn-hangzhou}
      OSS_BUCKET: ${OSS_BUCKET}
      OSS_PUBLIC_ENDPOINT: ${OSS_PUBLIC_ENDPOINT:-}
      OSS_INTERNAL_ENDPOINT: ${OSS_INTERNAL_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET}
      OSS_SIGNED_URL_TTL_SECONDS: ${OSS_SIGNED_URL_TTL_SECONDS:-600}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-5}
      AI_DAILY_QUOTA: ${AI_DAILY_QUOTA:-100}
      AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-10}
      AI_IP_RATE_LIMIT_PER_MINUTE: ${AI_IP_RATE_LIMIT_PER_MINUTE:-20}

  caddy:
    image: caddy:2-alpine
    container_name: caloriemaster-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  caddy_data:
  caddy_config:
